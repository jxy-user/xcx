<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考祝福</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 倒计时样式 */
        #countdown {
            display: none;
            font-size: 200px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.8),
                         0 0 40px rgba(255,255,255,0.6),
                         0 0 60px rgba(255,255,255,0.4);
            animation: countPulse 1s ease-in-out;
        }

        @keyframes countPulse {
            0% { transform: scale(3); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        /* 输入界面 */
        #input-screen {
            text-align: center;
            color: #fff;
        }

        #input-screen h1 {
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
            color: #FFD700;
        }

        #name-input {
            font-size: 24px;
            padding: 15px 30px;
            width: 300px;
            border: 2px solid #FFD700;
            border-radius: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            outline: none;
            margin-bottom: 20px;
        }

        #name-input::placeholder {
            color: rgba(255,215,0,0.5);
        }

        #start-btn {
            font-size: 24px;
            padding: 15px 50px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255,215,0,0.8);
        }

        /* 粒子文字画布 */
        #particle-canvas {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 5;
            pointer-events: none; /* 让鼠标事件穿透到下层 */
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    
    <div class="container">
        <!-- 输入界面 -->
        <div id="input-screen">
            <h1>✨ 高考祝福生成器 ✨</h1>
            <input type="text" id="name-input" placeholder="请输入你的名字">
            <br>
            <button id="start-btn">🎬 开始播放</button>
        </div>

        <!-- 倒计时显示 -->
        <div id="countdown">3</div>
    </div>

    <script>
        // ============ 矩阵雨背景 ============
        const matrixCanvas = document.getElementById('matrix-canvas');
        const matrixCtx = matrixCanvas.getContext('2d');

        matrixCanvas.width = window.innerWidth;
        matrixCanvas.height = window.innerHeight;

        const chars = '金榜题名前程似锦梦想成真学业有成鹏程万里一帆风顺万事如意心想事成成功胜利努力奋斗拼搏坚持加油未来可期';
        const fontSize = 16;
        const columns = matrixCanvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function drawMatrix() {
            matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

            matrixCtx.fillStyle = '#FFD700';
            matrixCtx.font = `${fontSize}px Microsoft YaHei`;
            matrixCtx.shadowBlur = 15;
            matrixCtx.shadowColor = '#FFD700';

            for (let i = 0; i < drops.length; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                matrixCtx.fillText(char, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > matrixCanvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 50);

        // ============ 粒子文字效果 ============
        const particleCanvas = document.getElementById('particle-canvas');
        const particleCtx = particleCanvas.getContext('2d');
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
            }

            draw() {
                particleCtx.save();
                particleCtx.globalAlpha = this.life;
                particleCtx.fillStyle = '#fff';
                particleCtx.shadowBlur = 15;
                particleCtx.shadowColor = '#fff';
                particleCtx.beginPath();
                particleCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                particleCtx.fill();
                particleCtx.restore();
            }
        }

        let particles = [];
        let animationId;

        function createTextParticles(text) {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            // 创建临时画布获取文字像素
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = particleCanvas.width;
            tempCanvas.height = particleCanvas.height;

            tempCtx.fillStyle = '#fff';
            tempCtx.font = 'bold 180px Microsoft YaHei';
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
            tempCtx.fillText(text, tempCanvas.width / 2, tempCanvas.height / 2);

            // 获取像素数据
            const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imageData.data;

            // 在文字位置创建粒子
            for (let y = 0; y < tempCanvas.height; y += 6) {
                for (let x = 0; x < tempCanvas.width; x += 6) {
                    const index = (y * tempCanvas.width + x) * 4;
                    if (data[index + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animateParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

            particles.forEach((p, index) => {
                p.update();
                p.draw();

                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            animationId = requestAnimationFrame(animateParticles);
        }

        // ============ 主流程控制 ============
        const inputScreen = document.getElementById('input-screen');
        const countdownEl = document.getElementById('countdown');
        const startBtn = document.getElementById('start-btn');
        const nameInput = document.getElementById('name-input');

        startBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            if (!name) {
                alert('请输入你的名字！');
                return;
            }
            
            startAnimation(name);
        });

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                startBtn.click();
            }
        });

        function startAnimation(userName) {
            inputScreen.classList.add('hidden');
            particleCanvas.style.display = 'block';

            // 开始倒计时
            let count = 3;
            countdownEl.style.display = 'block';
            countdownEl.textContent = count;
            countdownEl.style.animation = 'none';
            setTimeout(() => countdownEl.style.animation = 'countPulse 1s ease-in-out', 10);

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.textContent = count;
                    countdownEl.style.animation = 'none';
                    setTimeout(() => countdownEl.style.animation = 'countPulse 1s ease-in-out', 10);
                } else {
                    clearInterval(countInterval);
                    countdownEl.style.display = 'none';
                    
                    // 显示祝福语
                    showBlessingAnimation(userName);
                }
            }, 1000);
        }

        function showBlessingAnimation(userName) {
            const blessings = [
                `加油 ${userName}`,
                '金榜题名',
                '必胜',
                '前程似锦',
                '梦想成真'
            ];

            let currentIndex = 0;

            function showNextBlessing() {
                if (currentIndex < blessings.length) {
                    particles = [];
                    createTextParticles(blessings[currentIndex]);

                    if (currentIndex === 0) {
                        animateParticles();
                    }

                    currentIndex++;
                    setTimeout(showNextBlessing, 5000);
                } else {
                    setTimeout(() => {
                        particles = [];
                        createTextParticles(`${userName} 高考加油！`);
                    }, 2000);
                }
            }

            showNextBlessing();
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
